openapi: 3.0.3

info:
  title: MCCTC BYOD Petition API
  description: >
    API endpoint for retrieving current MCCTC BYOD petition signature progress.
    Data is collected from the Change.org petition page.
  version: 1.0.0

servers:
  - url: https://savebyod.netlify.app/.netlify/functions

paths:
  /petition:
    get:
      summary: Get petition progress
      operationId: getPetitionProgress
      description: Returns current petition signatures, goal, completion percentage, and update time.

      responses:
        "200":
          description: Successful petition status response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetitionProgress"

        "500":
          description: Failed to retrieve petition data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PetitionError"


components:
  schemas:

    PetitionProgress:
      type: object
      required:
        - signatures
        - goal
        - percent
        - updatedAt

      properties:
        signatures:
          type: integer
          description: Current number of petition signatures.
          example: 25

        goal:
          type: integer
          description: Current petition signature goal.
          example: 200

        percent:
          type: number
          description: Percentage of the goal reached.
          example: 12.5

        updatedAt:
          type: string
          format: date-time
          description: Time the petition data was retrieved.
          example: "2026-07-12T15:30:00.000Z"


    PetitionError:
      type: object
      required:
        - goal
        - percent
        - updatedAt
        - error

      properties:
        signatures:
          type: integer
          nullable: true
          description: Signature count if available. Null if retrieval failed.
          example: null

        goal:
          type: integer
          description: Current petition signature goal.
          example: 200

        percent:
          type: number
          description: Percentage reached when the error occurred.
          example: 0

        updatedAt:
          type: string
          format: date-time
          description: Time the request was processed.
          example: "2026-07-12T15:30:00.000Z"

        error:
          type: string
          description: Error message.
          example: "Could not extract signature count from Change.org page."
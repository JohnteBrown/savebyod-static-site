source: "."
template_extensions:
  - md
  - liquid
include_drafts: false
ignore:
  - "build"
  - "serve"
  - "README.md"
  - "LICENSE"
destination: _site

site:
  title: Save BYOD Initiative (SBI)
  description: The official petition landing site for restoring a bring-your-own-device policy at MCCTC.
  base_url: ~

posts:
  rss: rss.xml

assets:
  sass:
    style: Nested
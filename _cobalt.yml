source: "."
template_extensions:
  - md
  - liquid
include_drafts: false
ignore:
  - "build"
  - "serve"
  - "README.md"
  - "LICENSE"
  - "deploy-prep.sh"
  - "netlify.toml"
  - ".pre-commit-config.yaml"
  - ".markdownlint.yml"
  - "netlify"
  - ".gitignore"
  - ".gitconfig"
  - ".devcontainer"
  - "LICENSE"
destination: _site

site:
  title: Save BYOD Initiative (SBI)
  description: The official petition landing site for restoring a bring-your-own-device policy at MCCTC.
  base_url: https://savebyod.netlify.app

posts:
  rss: rss.xml

assets:
  sass:
    style: Nested